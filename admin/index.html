<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo | A/D G.E.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Reusing some common CSS and adding specific admin CSS -->
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-body">
    <div class="login-container">
        <div class="login-brand">
            <img src="../img/images (1).jpg" alt="A/D G.E. Logo" onerror="this.src='https://placehold.co/100x100?text=Logo'">
            <h2>Asambleas de Dios</h2>
            <p>Sistema de Gestión Administrativa</p>
        </div>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required placeholder="Ingrese su usuario">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">
            </div>
            <div id="loginError" class="error-message"></div>
            <button type="submit" class="btn-primary login-btn">Iniciar Sesión</button>
        </form>
        <div class="login-footer">
            <a href="../index.html">&larr; Volver al sitio web principal</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
